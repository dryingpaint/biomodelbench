id: vep_c_ot_transfer_v2
title: VEP-C — OT transfer, open-ended features, blind eval
modality: dna
compute_tier: T1
headline_metric: auprc
description: |
  Train on 72,093 Open Targets Genetics fine-mapped GWAS variants (labels
  only, no features shipped) and predict blind on 11,400 TraitGym
  complex_traits_matched_9 variants. Agent chooses which online resources
  to query for features (UCSC bigWig hub, CADD API, gnomAD, ENCODE, Ensembl
  VEP, its own DNA / protein FM inference). Test labels never enter the
  container.
answer_file: answer.parquet
data_files:
  - bundle/train.parquet
  - bundle/test.parquet
  - bundle/prompt.md
wall_clock_hours: 10
sources:
  train: Open Targets Genetics credible_set release (studyType=gwas)
  test: TraitGym complex_traits_matched_9 (Chen et al. 2024)
anti_leak:
  policy: drop OT variants whose (chrom, pos, ref, alt) appears in the TraitGym test set
