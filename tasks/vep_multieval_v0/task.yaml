id: vep_multieval_v0
title: VEP multi-eval — one submission, two hidden test sets (TraitGym + ClinVar)
modality: dna
compute_tier: T1
headline_metric: auprc_traitgym
description: |
  Same agent contract as vep_c_open_v0: only variant IDs are shipped, no
  labels, no features. The test file is now the union of two hidden test
  sets:
    - TraitGym complex_traits_matched_9 (11,400 GWAS-fine-mapped causal
      SNPs vs. matched non-causal controls in UK Biobank complex traits)
    - ClinVar 2-star+ (Pathogenic/Likely_pathogenic vs. Benign/Likely_benign
      variants from the NCBI ClinVar release, subsampled to keep the
      bundle tractable)
  The agent produces ONE score per variant. The grader has separate
  hidden labels per source and reports per-source AUPRC + AUROC plus a
  cross-source generalization gap. Two questions in one run: (1) does the
  model overfit TraitGym-specific quirks (narrow generalization test if
  additional in-source data is later added), (2) does the biological
  signal transfer to Mendelian pathogenicity (cross-domain).
answer_file: answer.parquet
data_files:
  - bundle/test.parquet
  - bundle/prompt.md
wall_clock_hours: 10
sources:
  test_traitgym: TraitGym complex_traits_matched_9 (Chen et al. 2024)
  test_clinvar: NCBI ClinVar VCF release, 2-star+ P/LP/B/LB variants
anti_leak:
  policy: |
    Agent is responsible for dropping any training variant whose
    (chrom, pos, ref, alt) appears in the shipped test.parquet. The
    prompt explicitly blacklists TraitGym-derivative sources AND raw
    ClinVar sources (NCBI ClinVar VCF releases, TSV summaries, and
    downstream aggregations like AlphaMissense which was trained on
    ClinVar labels).
